<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Mate - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Oriya:wght@400..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/Css files/loginPage.css">
</head>
<body>
  <div class="container">
    <div class="login-section">
      <form action="/index.html" method="get">
        <h2>Login to Your Account</h2>
        <label for="email">E-mail</label>
        <div class="input-box">
          <input type="email" placeholder="Email" required  pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
        </div>
        <label for="password">Password</label>
        <div class="input-box">
          <input type="password" placeholder="Password" required pattern="[A-Za-z\d]{8,16}" minlength="8" maxlength="16">
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>

    <div class="signup-section">
      <h2>New Here?</h2>
      <p>Sign up Now!</p>
      <button><a href="/Html files/regPage.html">Register</a></button>
    </div>
  </div>
  <script src="/api_token.js"></script>
</body>
</html>
