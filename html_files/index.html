<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css_files/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Oriya:wght@400..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero">
    <div class="carousel-image" style="background-image: url('/projectMedia/wp9444177-interstellar-poster-wallpapers.jpg');">
        <div class="youtube-trailer">
<iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/MGRm4IzK1SQ?si=t1FVN1nU5eK_IOfR" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
         </div>
        <div class="overlay"></div>
        <div class="nav-bar">
            <div class="nav-left">
                <video loop autoplay muted>
                    <source src="/projectMedia/moviemate.mp4" type="video/mp4">
                </video>
            </div>
            <div class="nav-middle">
                <input type="text" placeholder="Input Movie name here">
                <ul>
                    <li>Trending</li>
                    <li>Movies</li>
                    <li>TV Series</li>
                </ul>
            </div>
            <div class="nav-right">
                <button class="account"><a href="/html_files/loginPage.html">Account Login</a></button>
            </div>
        </div>
        <div class="items">
            <span class="spotlight">#1 Spotlight</span>
            <h1 class="show-name">Interstellar</h1>
            <div class="details">
                <p><img src="/projectMedia/play-button.png">Movie</p>
                <p><img src="/projectMedia/clock.png">169m</p>
                <p><img src="/projectMedia/calendar.png">2014</p>
            </div>
            <p class="overview">When Earth becomes uninhabitable in the future, a farmer and ex-NASA pilot, Joseph Cooper, is tasked to pilot a spacecraft, along with a team of researchers, to find a new planet for humans.</p>
            <div class="buttons">
                <button class="trailer"><img src="/projectMedia/trailerPlay.png">Trailer</button>
                <button class="detail-button"><a class="detail-link" href="/html_files/about.html" target="_self">Details</a></button>
            </div>
        </div>
        <div class="next-prev">
            <button class="next">&#10095;</button>
            <button class="prev">&#10094;</button>
        </div>
    </div>
</section>

</body>
</html>
