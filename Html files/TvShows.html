<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movies Grid</title>
  <link rel="stylesheet" href="/Css files/TvShows.css" />
</head>
<body>
  <div class="app">

    <div class="header">
      <h1 class="title">TV Shows</h1>
      <button class="filter-btn" id="openFilter">
        <img src="filter-svgrepo-com.svg" alt="filter" class="filter-icon" /> Filter
      </button>
    </div>


    <div id="tvShowGrid" class="tvShowGrid"></div>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h2>Filter</h2>
      <button class="close-btn" id="closeFilter">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="field">
        <label for="year">Year</label>
        <select id="year" class="select">
          <option>Default</option>
          <option>2025</option>
          <option>2024</option>
          <option>2023</option>
          <option>2022</option>
          <option>2021</option>
          <option>2020</option>
          <option>2019</option>
          <option>2018</option>
          <option>2017</option>
          <option>2016</option>
          <option>2015</option>
          <option>2014</option>
          <option>2013</option>
        </select>
      </div>

      <div class="field">
        <label for="genre">Genre</label>
        <select id="genre" class="select">
          <option>All Genres</option>
          <option>Romance</option>
          <option>Action</option>
          <option>Thriller</option>
          <option>Drama</option>
          <option>Animation</option>
          <option>Comedy</option>
          <option>History</option>
          <option>Science Fiction</option>
        </select>
      </div>

      <div class="field">
        <label for="sort">Sort By</label>
        <select id="sort" class="select">
          <option>Newest First</option>
          <option>Oldest First</option>
          <option>Title(A-Z)</option>
          <option>Title(Z-A)</option>
        </select>
      </div>

      <div class="field">
        <label for="region">Region</label>
        <select id="region" class="select">
          <option>Global</option>
          <option>India</option>
          <option>USA</option>
          <option>Russia</option>
          <option>Spain</option>
          <option>Japan</option>
          <option>UK</option>
        </select>
      </div>

      <div class="field">
        <label for="language">Language</label>
        <select id="language" class="select">
          <option>All Languages</option>
          <option>Hindi</option>
          <option>English</option>
          <option>Tamil</option>
          <option>Japanese</option>
          <option>Korean</option>
          <option>Punjabi</option>
          <option>Russian</option>
        </select>
      </div>
    </div>
    <div class="drawer-footer">
      <button id="applyBtn" class="apply-btn">APPLY</button>
      <button id="resetBtn" class="reset-btn">&#8635;</button>
    </div>
  </div>
<script src="/api_token.js"></script>
  <script src="/Js files/TvShows.js"></script>
</body>
</html>
