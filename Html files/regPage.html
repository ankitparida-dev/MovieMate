<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Mate - Register</title>
  <link rel="stylesheet" href="/css_files/regPage.css">
  <link rel="icon" href="/imagesfolder/image.png" type="icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Oriya:wght@400..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <header>
      <h2>Register</h2>
    </header>

    <section>
      <form id="registerForm">
        <div class="form-group name">
          <label for="name"><span>*</span> Name</label>
          <input type="text" id="name" required>
        </div>
        
        <div class="form-group email">
          <label for="email"><span>*</span> Email</label>
          <input type="email" id="email" required  pattern="[a-z0.9._%+\-]+@[a-z0.9.\-]+\.[a-z]{2,}$">
        </div>
        
        <div class="form-group password">
          <label for="password"><span>*</span> Password</label>
          <input type="password" id="password" required pattern="[A-Za-z\d]{8,16}" minlength="8" maxlength="16">
        </div>
        <div class="form-group password">
          <label for="confirmPassword"><span>*</span> Confirm password</label>
          <input type="password" id="confirmPassword" required>
        </div>
        
        <button type="submit" class="btn">Register</button>
      </form>
    </section>

    <footer>
      Already have an account? <a href="/html_files/loginPage.html">Login</a>
    </footer>
  </main>
</body>
</html>
