<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMate Static Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            text-align: center;
            padding: 50px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;

        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .success {
            color: #4ade80;

            margin: 20px 0;
        }
        .emoji {
            font-size: 4em;
            margin: 20px 0;
        }

</head>
<body>
    <div class="container">
        <div class="emoji">🎬 ✅</div>
        <h1>Static Files Working! 🚀</h1>
        <div class="success">✓ MovieMate backend is serving static files correctly</div>
        <p>This file is being served from:</p>
        <code>public/test.html</code>
    </div>

</html>
